services:
  postgres:
    image: pgvector/pgvector:pg18-trixie
    container_name: milestone-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_HOST_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./infra/postgres/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: milestone-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      model-server:
        condition: service_started
    volumes:
      - ./apps/api:/app/apps/api
      - ./evaluation:/app/evaluation
      - ./config:/app/config
      - document_storage:/app/apps/api/storage
    environment:
      - CI=true
      - REPO_ROOT=/app
      - DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      - DOCUMENT_STORAGE_DIR=/app/apps/api/storage/documents
      - MODEL_SERVER_URL=http://model-server:8000
      - EVAL_RESULTS_PATH=/app/evaluation/results.json
      - EVAL_REPORT_PATH=/app/evaluation/report.md
      - EVAL_STATUS_PATH=/app/evaluation/.run-status.json
      - EVAL_AGENT_URL=http://api:4000/agent/ask
      - EVAL_PYTHON=python3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: milestone-web
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3000:3000"
    depends_on:
      - api
    volumes:
      - ./apps/web:/app/apps/web
      - ./evaluation:/app/evaluation
    environment:
      - CI=true
      - EVAL_RESULTS_PATH=/app/evaluation/results.json

  model-server:
    build:
      context: .
      dockerfile: apps/model-server/Dockerfile
    container_name: milestone-model-server
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "8000:8000"

volumes:
  postgres_data:
  document_storage:
